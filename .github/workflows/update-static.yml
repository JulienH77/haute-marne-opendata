name: "👥 Mise à jour données statiques (population)"

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-population:
    name: "Fetch population INSEE"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # historique complet requis pour le rebase

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - run: pip install -r scripts/requirements.txt

      - name: "📊 Fetch population"
        run: python scripts/fetch_population.py

      - name: "💾 Commit & push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/population/

          if git diff --staged --quiet; then
            echo "Aucune modification — skip."
            exit 0
          fi

          git commit -m "chore(data): population — $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main
          git push
          echo "✅ Push OK."
