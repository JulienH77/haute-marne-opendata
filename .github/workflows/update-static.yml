name: "👥 Mise à jour données statiques (population)"

on:
  schedule:
    # Le 1er de chaque mois à 3h00 UTC
    - cron: "0 3 1 * *"
  workflow_dispatch:
    # Déclenchement manuel

permissions:
  contents: write

jobs:
  update-population:
    name: "Fetch population INSEE"
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Les fichiers INSEE peuvent être lourds

    steps:
      # -----------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # -----------------------------------------------------------
      # 2. Setup Python
      # -----------------------------------------------------------
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      # -----------------------------------------------------------
      # 3. Fetch population
      # -----------------------------------------------------------
      - name: "📊 Fetch population (geo.api.gouv.fr + INSEE)"
        run: python scripts/fetch_population.py

      # -----------------------------------------------------------
      # 4. Commit & push
      # -----------------------------------------------------------
      - name: "💾 Commit & push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/population/

          if git diff --staged --quiet; then
            echo "Aucune modification détectée, skip commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(data): mise à jour automatique population — ${TIMESTAMP} [skip ci]"
            git push
            echo "✅ Données population pushées avec succès."
          fi
