name: "🌤️ Mise à jour données dynamiques (nuages + météo)"

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dynamic:
    name: "Fetch nuages + météo"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Historique complet pour éviter les conflits de rebase

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      - name: "☁️ Fetch nuages (EUMETSAT via matteason)"
        run: python scripts/fetch_clouds.py

      - name: "🌡️ Fetch météo (Open-Meteo)"
        run: python scripts/fetch_weather.py

      - name: "💾 Commit & push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/clouds/ data/weather/

          if git diff --staged --quiet; then
            echo "Aucune modification — skip commit."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore(data): nuages + météo — ${TIMESTAMP} [skip ci]"

          # Rebase sur le remote avant push pour éviter les conflits
          # (peut arriver si deux exécutions se chevauchent)
          git pull --rebase origin main

          git push
          echo "✅ Push OK."
