name: "🌤️ Mise à jour données dynamiques (nuages + météo)"

on:
  schedule:
    # Toutes les 3 heures (UTC) : 0h, 3h, 6h, 9h, 12h, 15h, 18h, 21h
    # Les nuages matteason sont eux-mêmes mis à jour toutes les 3h
    - cron: "0 */3 * * *"
  workflow_dispatch:
    # Déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write   # Nécessaire pour git push

jobs:
  update-dynamic:
    name: "Fetch nuages + météo"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # -----------------------------------------------------------
      # 1. Checkout du dépôt
      # -----------------------------------------------------------
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Récupérer le dernier commit pour éviter les conflits de push
          fetch-depth: 1

      # -----------------------------------------------------------
      # 2. Setup Python avec cache pip
      # -----------------------------------------------------------
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      # -----------------------------------------------------------
      # 3. Exécution des scripts
      # -----------------------------------------------------------
      - name: "☁️ Fetch nuages (EUMETSAT via matteason)"
        run: python scripts/fetch_clouds.py

      - name: "🌡️ Fetch météo (Open-Meteo)"
        run: python scripts/fetch_weather.py

      # -----------------------------------------------------------
      # 4. Commit et push si des fichiers ont changé
      # -----------------------------------------------------------
      - name: "💾 Commit & push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/clouds/ data/weather/

          # N'effectuer le commit que si des fichiers ont réellement changé
          if git diff --staged --quiet; then
            echo "Aucune modification détectée, skip commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(data): mise à jour automatique nuages + météo — ${TIMESTAMP} [skip ci]"
            git push
            echo "✅ Données pushées avec succès."
          fi
