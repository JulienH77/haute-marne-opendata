name: "🌤️ Mise à jour données dynamiques (météo)"

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    name: "🌡️ Météo"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - run: pip install -r scripts/requirements.txt

      - name: "🌡️ Fetch météo (Open-Meteo)"
        run: python scripts/fetch_weather.py

      - name: "💾 Commit & push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/weather/

          if git diff --staged --quiet; then
            echo "Aucune modification — skip."
            exit 0
          fi

          git commit -m "chore(data): météo — $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main
          git push
          echo "✅ Push OK."
